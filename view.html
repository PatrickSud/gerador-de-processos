<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carregando processo...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .loader-box { max-width: 420px; }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 20px;
      border: 4px solid rgba(226,232,240,0.25);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: #f87171; font-weight: 600; }
    a.retry { color: #6366f1; }
  </style>
</head>
<body>
  <div class="loader-box">
    <div class="spinner"></div>
    <p id="viewStatusText">Carregando o processo, por favor aguarde...</p>
  </div>

  <script>
    // === CONFIGURAÇÃO DO SUPABASE (deve ser igual à usada em admin.js) ===
    const SUPABASE_CONFIG = {
      url: "https://xkcwidluzrxodaydyxfz.supabase.co",
      anonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrY3dpZGx1enJ4b2RheWR5eGZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MTYwNjksImV4cCI6MjA5OTE5MjA2OX0.WcFpRYwnD-_qp_uyl3Va28x-QVdWRpLwZOAOCn_t-48",
      table: "processos"
    };

    (async function loadPublishedProcess() {
      const statusEl = document.getElementById('viewStatusText');
      const params = new URLSearchParams(window.location.search);
      const slug = (params.get('p') || '').trim();

      if (!slug) {
        statusEl.innerHTML = '<span class="err">Nenhum processo informado.</span><br>Verifique se o link contém o parâmetro "?p=identificador-do-processo".';
        return;
      }

      if (!SUPABASE_CONFIG.url || SUPABASE_CONFIG.url.includes('COLE_A_URL') ||
          !SUPABASE_CONFIG.anonKey || SUPABASE_CONFIG.anonKey.includes('COLE_SUA_ANON')) {
        statusEl.innerHTML = '<span class="err">Visualizador não configurado.</span><br>Preencha SUPABASE_CONFIG no arquivo view.html.';
        return;
      }

      try {
        const endpoint = `${SUPABASE_CONFIG.url.replace(/\/+$/, '')}/rest/v1/${SUPABASE_CONFIG.table}?slug=eq.${encodeURIComponent(slug)}&select=html&limit=1`;
        const res = await fetch(endpoint, {
          headers: {
            "apikey": SUPABASE_CONFIG.anonKey,
            "Authorization": `Bearer ${SUPABASE_CONFIG.anonKey}`
          }
        });

        if (!res.ok) {
          throw new Error(`Falha ao consultar o processo (HTTP ${res.status})`);
        }

        const rows = await res.json();
        if (!rows || rows.length === 0 || !rows[0].html) {
          statusEl.innerHTML = '<span class="err">Processo não encontrado.</span><br>Verifique se o link está correto ou se o processo ainda está publicado.';
          return;
        }

        // Substitui o documento inteiro pelo HTML publicado (mantém CSS/JS relativos: style.css e script.js)
        document.open();
        document.write(rows[0].html);
        document.close();

      } catch (err) {
        statusEl.innerHTML = `<span class="err">Erro ao carregar o processo.</span><br>${err.message}`;
      }
    })();
  </script>
</body>
</html>
